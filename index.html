<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Investor Graph</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="d325eb73-0d8f-4529-aa76-f32ebfd92226"></script>
<script defer src="https://cloud.umami.is/script.js" data-website-id="d325eb73-0d8f-4529-aa76-f32ebfd92226"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ===== Apple Design System Foundation ===== */
@font-face {
  font-family: 'SF Pro Display';
  src: local('SF Pro Display'), local('.SFNSDisplay'), local('SFProDisplay-Regular'),
       local('Helvetica Neue'), local('Helvetica');
  font-weight: 100 900;
}
@font-face {
  font-family: 'SF Pro Text';
  src: local('SF Pro Text'), local('.SFNSText'), local('SFProText-Regular'),
       local('Helvetica Neue'), local('Helvetica');
  font-weight: 100 900;
}

:root {
  /* Apple Colors */
  --apple-black: #000000;
  --apple-white: #ffffff;
  --apple-gray-bg: #f5f5f7;
  --apple-near-black: #1d1d1f;
  --apple-blue: #0071e3;
  --apple-link-blue: #0066cc;
  --apple-link-blue-dark: #2997ff;
  --apple-text-secondary: rgba(255, 255, 255, 0.56);
  --apple-text-tertiary: rgba(255, 255, 255, 0.32);
  --apple-surface-dark-1: #161617;
  --apple-surface-dark-2: #1c1c1e;
  --apple-surface-dark-3: #2c2c2e;

  /* Organization Colors — desaturated, Apple-refined */
  --org-china-top: #64d2ff;
  --org-china-early: #30d158;
  --org-corporate: #ff6482;
  --org-us-other: #5e9eff;
  --org-cvc: #ff9f0a;
  --org-us-top: #bf5af2;
  --org-angel: #ffd60a;
  --org-independent: #98989d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--apple-black);
  color: var(--apple-white);
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
  min-height: 100vh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Navigation — Apple Glass ===== */
#nav-bar {
  position: fixed;
  top: 36px; left: 0; right: 0;
  height: 48px;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 1000;
  border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
}
.nav-title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
  color: var(--apple-white);
  white-space: nowrap;
}
.nav-separator {
  width: 0.5px;
  height: 20px;
  background: rgba(255, 255, 255, 0.16);
  margin: 0 16px;
}
.nav-stats {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  color: var(--apple-text-secondary);
  white-space: nowrap;
  flex-shrink: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  max-width: 120px;
}

/* Search — Apple Style */
.nav-search-wrapper {
  margin-left: 16px;
  position: relative;
  flex-shrink: 1;
  min-width: 120px;
}
#search-input {
  width: 180px;
  height: 32px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 8px;
  color: var(--apple-white);
  padding: 0 12px 0 32px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  outline: none;
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
}
#search-input::placeholder {
  color: rgba(255, 255, 255, 0.32);
}
#search-input:focus {
  width: 280px;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 0 2px var(--apple-blue);
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.32);
  font-size: 13px;
  pointer-events: none;
}

/* Filter Pills — Apple Pill CTA */
.filter-group {
  display: flex;
  gap: 6px;
  margin-left: 16px;
  flex-shrink: 1;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-pill {
  padding: 5px 14px;
  border-radius: 980px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  line-height: 1.33;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: transparent;
  color: rgba(255, 255, 255, 0.56);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  white-space: nowrap;
}
.filter-pill:hover {
  border-color: rgba(255, 255, 255, 0.32);
  color: rgba(255, 255, 255, 0.8);
}
.filter-pill.active {
  background: var(--apple-blue);
  border-color: var(--apple-blue);
  color: var(--apple-white);
}
.nav-spacer { flex: 1; }

/* Language Toggle — Apple Segmented Control */
.lang-toggle {
  display: flex;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 8px;
  padding: 2px;
  gap: 0;
  margin-left: 12px;
}
.lang-btn {
  padding: 4px 12px;
  border-radius: 6px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.12px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255, 255, 255, 0.4);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  white-space: nowrap;
}
.lang-btn:hover {
  color: rgba(255, 255, 255, 0.64);
}
.lang-btn.active {
  background: rgba(255, 255, 255, 0.12);
  color: var(--apple-white);
}

/* ===== Graph Canvas ===== */
#graph-container {
  position: relative;
  margin-top: 84px;
  height: calc(100vh - 204px);
  min-height: 480px;
  width: 100%;
}
body.no-insights #graph-container {
  height: calc(100vh - 84px);
  min-height: unset;
}
#graph-container svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ===== Legend — Bottom Left ===== */
#legend {
  position: fixed;
  bottom: 16px;
  left: 24px;
  z-index: 100;
  pointer-events: all;
}
.legend-card {
  background: rgba(28, 28, 30, 0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-radius: 12px;
  padding: 16px 20px;
  min-width: 160px;
}
.legend-heading {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--apple-text-tertiary);
  margin-bottom: 10px;
}
.legend-heading:not(:first-child) { margin-top: 14px; }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  cursor: default;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-line-sample {
  width: 16px;
  height: 0;
  flex-shrink: 0;
}
.legend-label {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  color: rgba(255, 255, 255, 0.56);
}

/* ===== Detail Panel — Apple Sidebar ===== */
#detail-panel {
  position: fixed;
  top: 48px;
  right: 0;
  width: 380px;
  height: calc(100vh - 48px);
  background: var(--apple-surface-dark-1);
  border-left: 0.5px solid rgba(255, 255, 255, 0.08);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  overflow-y: auto;
  overflow-x: hidden;
}
#detail-panel.open {
  transform: translateX(0);
}
#detail-panel::-webkit-scrollbar { width: 0; }

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: rgba(255, 255, 255, 0.56);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 1;
}
.detail-close:hover {
  background: rgba(255, 255, 255, 0.2);
}

.detail-header {
  padding: 40px 24px 20px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.detail-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.08);
}
.detail-avatar.loading {
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
  background-size: 200% 200%;
  animation: shimmer 1.5s ease infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
.detail-avatar-placeholder {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.2);
  font-family: 'SF Pro Display', -apple-system, sans-serif;
}
.detail-header-info {
  flex: 1;
  min-width: 0;
}
.detail-name {
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.196px;
  line-height: 1.14;
  color: var(--apple-white);
  margin-bottom: 6px;
}
.detail-title {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  line-height: 1.43;
  color: var(--apple-text-secondary);
}
.detail-org-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 12px;
  border-radius: 980px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.12px;
}

/* Style Tags */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.detail-tag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 980px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: -0.08px;
  background: rgba(41, 151, 255, 0.12);
  color: var(--apple-link-blue-dark);
  border: 0.5px solid rgba(41, 151, 255, 0.2);
}

.detail-section {
  padding: 20px 24px;
  border-top: 0.5px solid rgba(255, 255, 255, 0.06);
}
.detail-section-title {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--apple-text-tertiary);
  margin-bottom: 12px;
}
.detail-section p {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.72);
}

/* Paper items */
.paper-entry {
  padding: 8px 0;
  display: flex;
  gap: 8px;
  align-items: baseline;
}
.paper-year {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.12px;
  color: var(--apple-link-blue-dark);
  flex-shrink: 0;
  min-width: 36px;
}
.paper-title {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: -0.12px;
  line-height: 1.38;
  color: rgba(255, 255, 255, 0.64);
}

/* Connection items */
.conn-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  margin: 0 -8px;
  padding-left: 8px;
  padding-right: 8px;
  transition: background 0.2s;
}
.conn-entry:hover {
  background: rgba(255, 255, 255, 0.04);
}
.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.conn-info {
  flex: 1;
  min-width: 0;
}
.conn-name {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  color: var(--apple-white);
}
.conn-relation {
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
  margin-top: 1px;
}
.conn-type-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
  padding: 2px 8px;
  border-radius: 980px;
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  flex-shrink: 0;
}

/* ===== SVG Styles ===== */

/* Links — 4 tiers of visual weight */
.link-line {
  transition: stroke-opacity 0.35s ease, stroke-width 0.35s ease;
  stroke-linecap: round;
}
/* Cofounder: strongest bond, solid bright green */
.link-line.type-cofounder {
  stroke: #30d158;
  stroke-width: 2.5;
  stroke-opacity: 0.5;
}
/* Coauthor: strong academic tie, solid blue */
.link-line.type-former-colleague {
  stroke: #2997ff;
  stroke-width: 1.8;
  stroke-opacity: 0.35;
}
/* Advisor: mentor line, dashed cyan */
.link-line.type-mentor {
  stroke: #64d2ff;
  stroke-width: 1.8;
  stroke-opacity: 0.4;
  stroke-dasharray: 8 5;
}
/* Colleague: weakest, subtle dotted */
.link-line.type-industry-peer {
  stroke: rgba(255, 255, 255, 0.5);
  stroke-width: 0.8;
  stroke-opacity: 0.15;
  stroke-dasharray: 2 6;
}

.node-group {
  transition: opacity 0.3s ease;
}
.node-glow {
  transition: opacity 0.3s ease;
}
.node-label {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-weight: 500;
  fill: rgba(255, 255, 255, 0.64);
  text-anchor: middle;
  pointer-events: none;
  transition: fill 0.3s, font-size 0.3s;
}

/* Dim / Highlight states */
.node-group.dimmed { opacity: 0.06; }
.node-group.highlighted { opacity: 1; }
.node-group.highlighted .node-label {
  fill: var(--apple-white);
  font-weight: 600;
}
.node-group.highlighted .node-glow { opacity: 0.5; }

.link-line.dimmed { stroke-opacity: 0.015 !important; }
.link-line.highlighted.type-cofounder { stroke-opacity: 0.85 !important; stroke-width: 3.5px !important; }
.link-line.highlighted.type-former-colleague { stroke-opacity: 0.75 !important; stroke-width: 3px !important; }
.link-line.highlighted.type-mentor { stroke-opacity: 0.7 !important; stroke-width: 2.5px !important; }
.link-line.highlighted.type-industry-peer { stroke-opacity: 0.5 !important; stroke-width: 1.5px !important; stroke-dasharray: none !important; }

/* ===== Tooltip ===== */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(28, 28, 30, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 8px;
  padding: 8px 12px;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 240px;
}
#tooltip.visible { opacity: 1; }
.tooltip-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.12px;
  color: var(--apple-white);
}
.tooltip-org {
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-secondary);
  margin-top: 2px;
}

/* ===== Keyboard hint ===== */
/* ===== Bottom Quick Links ===== */
#quick-links {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  height: 36px;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  z-index: 1000;
  padding: 0 16px;
}
.quick-link {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  color: rgba(255, 255, 255, 0.4);
  text-decoration: none;
  padding: 4px 12px;
  border-radius: 980px;
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  white-space: nowrap;
}
.quick-link:hover {
  color: rgba(255, 255, 255, 0.8);
  border-color: rgba(255, 255, 255, 0.24);
  background: rgba(255, 255, 255, 0.06);
}
.quick-link.active {
  color: var(--apple-link-blue-dark);
  border-color: rgba(41, 151, 255, 0.3);
}
.quick-link-sep {
  color: rgba(255, 255, 255, 0.12);
  font-size: 11px;
}

#keyboard-hint {
  position: fixed;
  bottom: 16px;
  right: 24px;
  z-index: 100;
  display: flex;
  gap: 12px;
}
.hint-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
}
.hint-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.06);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
}

/* ===== Mobile Responsive ===== */
/* ===== Mini Map — Bottom Right ===== */
#geo-map {
  position: fixed;
  bottom: 16px;
  right: 24px;
  z-index: 100;
  width: 220px;
  pointer-events: none;
}
.geo-card {
  background: rgba(28, 28, 30, 0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-radius: 12px;
  padding: 12px 14px 8px;
}
.geo-heading {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--apple-text-tertiary);
  margin-bottom: 8px;
}
.geo-svg { width: 100%; display: block; }
.geo-bubble {
  fill: var(--apple-blue);
  fill-opacity: 0.5;
  stroke: var(--apple-blue);
  stroke-width: 1;
  stroke-opacity: 0.8;
}
.geo-label {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 8px;
  fill: rgba(255, 255, 255, 0.6);
  text-anchor: middle;
  pointer-events: none;
}
.geo-count {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 7px;
  fill: rgba(255, 255, 255, 0.9);
  text-anchor: middle;
  font-weight: 600;
  pointer-events: none;
}
.geo-outline {
  fill: none;
  stroke: rgba(255, 255, 255, 0.08);
  stroke-width: 0.5;
}

/* Medium narrow screens */
@media (max-width: 1024px) {
  #nav-bar { height: auto; flex-wrap: wrap; padding: 8px 16px; gap: 6px; }
  .nav-separator { display: none; }
  .nav-stats { font-size: 11px; order: 5; width: 100%; }
  .nav-search-wrapper { margin-left: 0; flex: 1; min-width: 140px; order: 3; }
  #search-input { width: 100%; }
  #search-input:focus { width: 100%; }
  .filter-group { order: 6; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; margin-left: 0; padding-bottom: 2px; }
  .filter-pill { flex-shrink: 0; }
  .lang-toggle { order: 4; margin-left: auto; }
  .nav-spacer { display: none; }
  #graph-container { top: 88px; }
}

@media (max-width: 768px) {
  #nav-bar {
    height: auto;
    flex-wrap: wrap;
    padding: 8px 12px;
    gap: 6px;
  }
  .nav-title { font-size: 15px; }
  .nav-separator { display: none; }
  .nav-stats { font-size: 11px; order: 5; width: 100%; }
  .nav-search-wrapper { margin-left: 0; flex: 1; min-width: 0; order: 3; }
  #search-input { width: 100%; font-size: 13px; }
  #search-input:focus { width: 100%; }
  .filter-group {
    order: 6;
    width: 100%;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    padding-bottom: 2px;
    margin-left: 0;
  }
  .filter-pill { font-size: 11px; padding: 4px 10px; flex-shrink: 0; }
  .lang-toggle { order: 4; margin-left: auto; }
  .nav-spacer { display: none; }
  #graph-container { top: 90px; }
  #legend { display: none; }
  #geo-map { display: none; }
  #detail-panel {
    width: 100vw;
    top: 0;
    height: 100vh;
    border-left: none;
    z-index: 9999;
  }

// ===================================================================
// D3 GRAPH
// ===================================================================
const W = window.innerWidth;
const H = window.innerHeight - 48;

const svg = d3.select("#main-svg");
const g = svg.append("g");

// Zoom
const zoomBehavior = d3.zoom().scaleExtent([0.15, 5])
  .on("zoom", ({transform}) => g.attr("transform", transform));
svg.call(zoomBehavior);

// Glow filter
const defs = svg.append("defs");
const glowFilter = defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
glowFilter.append("feGaussianBlur").attr("stdDeviation","5").attr("result","blur");
const glowMerge = glowFilter.append("feMerge");
glowMerge.append("feMergeNode").attr("in","blur");
glowMerge.append("feMergeNode").attr("in","SourceGraphic");

// Force simulation
const simulation = d3.forceSimulation(scholars)
  .force("link", d3.forceLink(connections).id(d=>d.id).distance(d=>{
    if(d.type==="cofounder")return 70;if(d.type==="coauthor")return 95;if(d.type==="advisor")return 110;return 140;
  }).strength(d=>{
    if(d.type==="cofounder")return 0.8;if(d.type==="coauthor")return 0.4;if(d.type==="advisor")return 0.5;return 0.12;
  }))
  .force("charge", d3.forceManyBody().strength(-380))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(36))
  .force("x", d3.forceX(W/2).strength(0.03))
  .force("y", d3.forceY(H/2).strength(0.03));

// Links — use <path> for curved lines
const linkG = g.append("g");
const linkLines = linkG.selectAll("path").data(connections).join("path")
  .attr("class", d => `link-line type-${d.type}`)
  .attr("fill", "none");

// Nodes
const nodeG = g.append("g");
const nodeGroups = nodeG.selectAll("g").data(scholars).join("g")
  .attr("class","node-group")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

function nodeSize(d){
  const c=connections.filter(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    return s===d.id||t===d.id;
  }).length;
  return Math.min(Math.max(c*1.3+4,5),16);
}

// Glow
nodeGroups.append("circle").attr("class","node-glow")
  .attr("r",d=>nodeSize(d)+8)
  .attr("fill",d=>getColor(d.org))
  .attr("opacity",0.15)
  .attr("filter","url(#glow)");

// Circle
nodeGroups.append("circle").attr("class","node-circle")
  .attr("r",d=>nodeSize(d))
  .attr("fill",d=>getColor(d.org))
  .attr("stroke","rgba(255,255,255,0.08)")
  .attr("stroke-width",0.5)
  .style("cursor","pointer");

// Labels — name + org
nodeGroups.append("text").attr("class","node-label node-name-label")
  .attr("dy",d=>nodeSize(d)+13)
  .attr("font-size","10px")
  .attr("letter-spacing","-0.08px")
  .text(d=>d.name);
nodeGroups.append("text").attr("class","node-label node-org-label")
  .attr("dy",d=>nodeSize(d)+23)
  .attr("font-size","8px")
  .attr("letter-spacing","-0.06px")
  .attr("fill","rgba(255,255,255,0.35)")
  .text(d=>d.org);

// Tick — straight lines
simulation.on("tick",()=>{
  linkLines.attr("d", d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);
  nodeGroups.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// INTERACTIONS
// ===================================================================
const tooltip = document.getElementById("tooltip");

// Hover highlight
nodeGroups.on("mouseenter",(event,d)=>{
  const connected = new Set([d.id]);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(s===d.id)connected.add(t);if(t===d.id)connected.add(s);
  });
  nodeGroups.classed("dimmed",n=>!connected.has(n.id)).classed("highlighted",n=>connected.has(n.id));
  linkLines.classed("dimmed",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s!==d.id&&t!==d.id;
  }).classed("highlighted",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s===d.id||t===d.id;
  });
  // Tooltip
  const zhTip = scholarZh[d.id];
  document.getElementById("tooltip-name").textContent = (currentLang === "zh" && zhTip && zhTip.zhName) ? zhTip.zhName + "  " + d.name : d.name;
  document.getElementById("tooltip-org").textContent=d.org;
  tooltip.classList.add("visible");
}).on("mousemove",(event)=>{
  tooltip.style.left=(event.clientX+14)+"px";
  tooltip.style.top=(event.clientY-10)+"px";
}).on("mouseleave",()=>{
  nodeGroups.classed("dimmed",false).classed("highlighted",false);
  linkLines.classed("dimmed",false).classed("highlighted",false);
  tooltip.classList.remove("visible");
});

// ===================================================================
// SEARCH
// ===================================================================
document.getElementById("search-input").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){
    nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;
  }
  const match=new Set();
  scholars.forEach(s=>{
    if(s.name.toLowerCase().includes(q)||s.org.toLowerCase().includes(q)||s.title.toLowerCase().includes(q))match.add(s.id);
  });
  const expanded=new Set(match);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(match.has(s))expanded.add(t);if(match.has(t))expanded.add(s);
  });
  nodeGroups.style("opacity",d=>match.has(d.id)?1:expanded.has(d.id)?0.4:0.04);
  linkLines.style("opacity",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return(match.has(s)||match.has(t))?0.5:0.02;
  });
});

// ===================================================================
// FILTER PILLS
// ===================================================================
document.querySelectorAll(".filter-pill").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-pill").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const f=btn.dataset.filter;
    if(f==="all"){nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;}
    const match=new Set();
    scholars.forEach(s=>{if(s.field&&s.field.includes(f))match.add(s.id);});
    nodeGroups.style("opacity",d=>match.has(d.id)?1:0.04);
    linkLines.style("opacity",l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return(match.has(s)&&match.has(t))?0.5:0.02;
    });
  });
});

  }
});

  lizhu:{zhName:"李竹",title:"英诺天使创始人 · 500+天使投资",bio:"2013年创办英诺天使基金。中国最活跃的天使投资人之一，投资500+家早期企业。聚焦：AI、机器人、智能硬件。以高频率、论文驱动的天使投资著称。"},
  wushichun:{zhName:"吴世春",title:"梅花创投创始人 · 投资中国梦",bio:"1975年生于湖南。2014年创办梅花创投。投资：宇树科技（早期天使）、多家机器人公司、消费硬件。理念：投资中国梦。活跃于社交媒体分享投资逻辑。"},
  liuqin:{zhName:"刘芹",title:"五源资本创始合伙人 · 小米$500K→$50亿回报",bio:"与Richard Liu联合创办五源资本（原晨兴资本）。创造中国VC史上最伟大的回报之一：$50万投入小米早期→$50亿+回报。也投资：快手、小鹏汽车。以极度耐心和信念投资著称。"},
  leijun:{zhName:"雷军",title:"小米创始人 · 硬件生态创造者",bio:"1969年生于湖北。武大计算机。金山CEO→UCWeb→小米（2010）→顺为资本（2011）。创造了小米生态链模式：投资追觅、石头、云鲸、九号、Aqara、Loona等数百家。催生了大规模硬件创业浪潮。身家约250亿美元。小米市值$1000亿+。"},
  shenjin:{zhName:"沈劲",title:"高通创投总裁 · 中美科技桥梁",bio:"高通高级副总裁，高通创投总裁。最早和最活跃的CVC之一，连接美国芯片和中国硬件。投资：小米（早期）、众多中国AI/机器人公司。美国半导体产业与深圳硬件生态的深度连接者。"},
  lizexiang2:{zhName:"李泽湘",title:"港科大教授 · 硬件创业教父",bio:"港科大教授。中国硬件领域最重要的单一投资人。创办XbotPark松山湖基地，孵化60+家公司。通过清水湾基金投资：大疆、云鲸、LiberLive、逸动、卧安、海柔、RingConn、来牟。与高秉强和甘洁组成港科大教授投资三人组。"},
  gaobq2:{zhName:"高秉强",title:"港科大教授 · 硬件天使传奇",bio:"港科大教授。与李泽湘并肩的天使投资人。代表作：2023年投100万美元救跃然创新(Haivivi)于破产边缘。通过Brizan Ventures II和未来科技基金投资RingConn。港科大教授三人组的核心成员。"},
  luqi2:{zhName:"陆奇",title:"MiraclePlus创始人 · 中美桥梁",bio:"CMU计算机博士。IBM→Yahoo副总裁→微软执行副总裁→百度COO（李彦宏招募）→YC中国（Sam Altman亲自招募）→MiraclePlus。投资340+家公司。硅谷和中国科技之间的终极桥梁。美国科技界最高级别华人高管之一。"},
  vinodkhosla:{title:"Khosla Ventures创始人 · Sun联合创始人",bio:"1955年生于印度。IIT Delhi EE，CMU，斯坦福MBA。1982年联合创办Sun Microsystems。2004年创办Khosla Ventures。投资：Rabbit R1（$3000万）、Figure AI、Field AI（$3.14亿A轮农业机器人）。深科技和突破性硬件。身家$78亿。"},
  marca16z:{title:"a16z联合创始人 · 发明了网络浏览器",bio:"1971年生于爱荷华。UIUC CS。创造Mosaic（第一个网络浏览器），联合创办Netscape（1995 IPO）。2009年与Ben Horowitz联合创办a16z。管理$420亿+，总资产$900亿。投资：Figure AI、Anduril。2026.1融资$150亿。大规模AI硬件和机器人押注。"},
  peterthiel:{title:"Founders Fund联合创始人 · PayPal教父",bio:"1967年生于德国，在美国长大。斯坦福哲学+法学。联合创办PayPal、Palantir。Founders Fund投资：SpaceX、Anduril、Stripe。Thiel Fellowship资助Chris Olah等硬件/AI创业者（$10万跳过大学）。理念：从0到1。"},
  joshwolfe:{title:"Lux Capital联合创始人 · 深科技专家",bio:"2000年联合创办Lux Capital。深科技、国防科技、前沿硬件专家。领投：Anduril $15亿轮，投资Physical Intelligence，众多机器人/材料/生物科技。理念：投资未来，拥抱科幻变为现实。"},
  jeffbezos:{title:"亚马逊创始人 · 机器人超级天使",bio:"1994年创办亚马逊。通过Bezos Expeditions个人投资。领投：Figure AI $6.75亿轮（→$390亿估值）、Physical Intelligence $4亿A轮（$20亿）。全球最大的人形机器人个人支持者之一。身家$2000亿+。"},
  jensenhuang:{zhName:"黄仁勋",title:"NVIDIA创始人兼CEO · AI算力教父",bio:"1963年生于台湾，在俄勒冈长大。俄勒冈州立EE，斯坦福硕士。1993年联合创办NVIDIA。NVIDIA Ventures投资了几乎所有主要AI/机器人公司。市值$3万亿+。AI算力教父——每个机器人和AI模型都跑在他的GPU上。"},
  masason:{zhName:"孙正义",title:"软银创始人 · 千亿愿景基金",bio:"1957年生于日本（韩裔）。UC Berkeley经济学。1981年创办软银。愿景基金1号：$1000亿（2017，史上最大）。投资：ARM、波士顿动力、Cruise、Humane（$2.3亿）。大胆押注机器人和AI硬件。争议性的撒网式投资方法。"},
  daiyusen:{zhName:"戴雨森",title:"真格基金管理合伙人 · 聚美联创",bio:"清华工业工程学士。斯坦福管理科学硕士（退学）。2009年与陈欧联合创办聚美优品任产品副总裁，2014年纽交所IPO。2017年加入真格基金任管理合伙人。投资：月之暗面/Kimi（杨植麟）、观夏、Party Animals、东方空间。福布斯中国创投人100（2024）。聚焦AI应用、消费、深科技。以深度AI研究和年轻创始人网络著称。"},
  liuyuan:{zhName:"刘元",title:"真格基金合伙人 · AI与硬件",bio:"真格基金合伙人。活跃于AI和硬件投资。曾评价Manus创始人肖弘为非名门出身但凭韧性成功的创业者典型。真格新一代合伙人，聚焦AI原生产品和硬件创新。"},
  xudl:{zhName:"许达来",title:"顺为资本联合创始人兼CEO · 雷军投资臂膀",bio:"与雷军联合创办顺为资本（2011）。管理超$30亿（美元+人民币）。聚焦：移动互联网、深科技、AI、机器人。投资：宇树科技（多轮）、千寻智能（PreA+追加）、首形科技（领投），形成机器人本体+具身智能+情感交互三角闭环。与小米生态深度协同。"},
  kuangzp:{zhName:"邝子平",title:"启明创投创始主管合伙人 · 斯坦福/伯克利",bio:"广州人。UCSF CS学士，斯坦福CS硕士，UC Berkeley MBA。2006年创办启明创投。投资580+家公司，210+家IPO/退出。管理$95亿。2025聚焦：AI为核心投资方向。投资：银河通用等多家机器人/AI公司。中国最有经验的VC领袖之一。"},
  dengfeng:{zhName:"邓锋",title:"北极光创投创始人 · NetScreen联创",bio:"在硅谷联合创办NetScreen Technologies（2004年被Juniper $40亿收购）。2005年创办北极光创投。中国最受尊敬的深科技VC之一。聚焦：企业科技、半导体、AI、先进制造。连接硅谷和中国科技。"},
  katherineboyle:{title:"a16z合伙人 · American Dynamism联创",bio:"a16z GP。与David Ulevitch联合创办American Dynamism——$6亿专项基金，投资航空/国防/制造/能源/机器人。创业者做国防相关硬件/制造/关键基础设施找她。"},
  davidulevitch:{title:"a16z合伙人 · American Dynamism联合负责人",bio:"a16z GP。与Boyle联合领导American Dynamism。聚焦机器人/国防/制造。认为机器人比人们想象的更近更激动人心。"},
  traestephens:{title:"Founders Fund合伙人 · Anduril联创",bio:"Founders Fund合伙人，事实上的二号人物。联合创办Anduril Industries（国防科技，$305亿估值）。FF领投Anduril $25亿G轮（$10亿单笔——FF史上最大）。也投了Gecko Robotics（2025独角兽）。创业者做国防/硬件/机器人找Founders Fund第一个找他。"},
  shahinfarshchi:{title:"Lux Capital合伙人 · 深科技博士",bio:"Lux Capital合伙人，博士。聚焦机器人、自主系统、半导体、太空。执行Josh Wolfe深科技论文的核心合伙人。创业者找Lux投机器人/芯片/前沿硬件找他。"},
  hemanttaneja:{title:"General Catalyst CEO · $80亿超级基金",bio:"GC CEO。IIT Bombay+MIT。2024融$80亿。聚焦AI转型：医疗/国防/工业/能源/金融。投资Anduril/Anthropic/Samsara/Stripe。畅销书作者。创业者做AI+工业转型找GC。"},
  peterbarrett:{title:"Playground Global联创 · 硬件实验室VC",bio:"2015年与Andy Rubin（Android创造者）联合创办Playground。管理$12亿。职业：Rocket Science Games→微软IPTV→CloudCar。聚焦机器人/量子/自动化/能源。投100+公司。创业者做硬件原型Playground字面意义上帮你造。"},
  milei:{zhName:"米磊",title:"中科创星创始合伙人 · 硬科技概念提出者",bio:"西工大本科，中科院西安光机所光学博士。2010年在做科技成果转化时提出硬科技概念。2013年创办中科创星。基金规模超1200亿。投资孵化500+硬科技企业。2024年投了70+个项目——全年最忙VC。福布斯中国科技人物2024。创业者做硬科技找中科院体系第一个找他。"},
  liuzhou:{zhName:"刘昼",title:"达晨财智董事长 · 中国最早PE/VC之一",bio:"达晨财智董事长，2000年创办。管理500亿+。2025机器人超活跃：投云深处（C轮5亿领投）、智平方（Pre-A领投）、因时机器人（B2领投）、众擎等。2025具身智能出手10+次。创业者找政府背景资金+耐心资本找达晨。"},
  tongchuangwy:{zhName:"同创伟业团队",title:"同创伟业 · 30+机器人组合",bio:"同创伟业，2000年创办，中国首批PE/VC。管理3000亿+。投资30+家机器人产业链企业。2025.3.19一天投3家机器人公司（霞智/数字华夏/中科第五纪）。创业者找全阶段政府背景硬科技资金找同创。"},
  lifeng:{zhName:"李丰",title:"峰瑞资本创始合伙人 · 前IDG/新东方",bio:"北大化学学士，Rochester化学硕士。新东方老师（2006 IPO财务自由）。共同创办秒真（广告数据）。前IDG合伙人。2015创办峰瑞。投150+：B站、三只松鼠、Unity、Coinbase。福布斯中国最佳VC连续5年。2025论文：智能硬件是新能源车和机器人之后的下一个焦点。创业者做早期消费+硬科技找峰瑞。"},
  davidchao:{title:"DCM联合创始人 · 中美桥梁",bio:"1996联合创办DCM。最早的中美跨境VC之一。投资：开心网、58同城、快手早期。DCM连接中美科技投资。创业者做中美跨境融资找DCM。"},
  hezhiqiang:{zhName:"贺志强",title:"联想创投总裁 · 联想科技VC",bio:"联想创投总裁。联想集团CVC臂膀。聚焦：AI、机器人、IoT、智能设备、企业科技。投资多家具身智能和硬件创业公司。独特优势：可为被投企业提供联想全球供应链和市场资源。"},
  niukg:{zhName:"牛奎光",title:"IDG资本合伙人 · 云/数据/企业",bio:"IDG合伙人。清华计算机本硕。前麦肯锡。聚焦大数据、云计算、企业服务、新兴技术。创业者找IDG投企业级/基础设施相关硬件找他。"},
  yuxh:{zhName:"俞信华",title:"IDG资本合伙人 · 新能源/半导体",bio:"2005年加入IDG。前西门子中国（移动通信）。浙大工学士，长江MBA。聚焦新能源、新材料、半导体设计。创业者找IDG投芯片/能源/材料硬件找他。"},
  zhengqs:{zhName:"郑庆生",title:"红杉中国合伙人 · 消费科技/AI",bio:"红杉中国合伙人。聚焦消费科技、AI、新零售。沈南鹏之后管理红杉中国基金的核心人物。创业者做消费硬件/AI设备/DTC品牌找红杉联系他。"},
  caoxi:{zhName:"曹曦",title:"红杉中国合伙人 · 深科技/硬件",bio:"红杉中国合伙人。聚焦深科技、先进制造、硬件。红杉硬件和机器人方向的核心合伙人。创业者做硬科技/制造/机器人找红杉联系他。"},
  wanghd:{zhName:"王华东",title:"经纬中国管理合伙人 · 硬件/EV/AI",bio:"经纬管理合伙人。从媒体人转型投资人。投资：陌陌、理想汽车（早期）、宇树、沐曦（AI芯片）。覆盖娱乐/消费/新能源/制造/AI。创业者做消费硬件和AI设备找经纬联系他。"},
  caowei:{zhName:"曹巍",title:"蓝驰创投合伙人 · 机器人专家",bio:"蓝驰合伙人。中国最专注机器人的VC合伙人。2016年起投机器人。组合：高仙机器人、蓝芯科技、银河通用（最早投资人+多轮跟投）、它石智航（$1.22亿天使联合领投）。认为2025下半年具身智能将密集交卷。创业者做机器人找蓝驰第一个找他。"},
  liliang:{zhName:"李良",title:"高瓴创始合伙人 · DVC/硬件负责人",bio:"高瓴创始合伙人兼DVC（深度价值创造）负责人。自动化出身。前10年做VC/PE。后带120+技术运营专家进百丽做数字化改造。现负责硬科技和气候变化投资。推出Aseed+种子计划（3年100家）。创业者找高瓴做种子/早期硬件找他。"},
  xushaoping:{zhName:"徐小平",title:"真格基金创始人 · 中国天使教父（已退居）",bio:"1956年生。与俞敏洪联合创办新东方。2011年创办真格——中国最知名天使基金。理念：投人不投事。投1000+家。2021年起将日常管理交给方爱之（CEO）和戴雨森（管理合伙人），自己退居宏观战略和退出决策。中国VC史上第一起创始人交接。"},
  fangazhi:{zhName:"方爱之",title:"真格基金创始合伙人兼CEO · 真格实际掌舵人",bio:"哥伦比亚大学学士，斯坦福MBA。前GE商业发展部+摩根大通投行。真格第一天起就参与基金框架搭建。创始合伙人兼CEO——真格现在的实际决策人。福布斯全球最佳创投人连续4年上榜（2019-2022，最高#12）。2021年起与戴雨森成为投资实际决策人。中国VC史上第一起交接：80后女性接棒50后创始人。创业者找真格第一个找她。"},
  yangjie:{zhName:"杨洁",title:"锦秋基金创始合伙人 · 前字节投资",bio:"原字节跳动投资负责人。2022创办锦秋（12年期）。一年50+AI项目（top 2节奏）。聚焦AI算力/应用/具身+硬件。组合：生数/Pokee/地瓜机器人。理念：模型是commodity，价值归产品。"},
  xiongwm:{zhName:"熊伟铭",title:"华创资本合伙人 · AI硬件论文",bio:"华创合伙人，主导技术投资。投资XREAL/深鉴/蓝箭。观点：AI硬件不会被巨头主导，新公司率先定义新形态。"},
  zhangjj:{zhName:"张津剑",title:"绿洲资本创始合伙人 · 全球化",bio:"绿洲创始合伙人。跨境科技/消费/AI。2025 Q2具身智能最活跃。新一代全球化优先VC。"},
  liuyhang:{zhName:"刘英航",title:"势乘资本创始合伙人 · 具身智能",bio:"势乘创始合伙人。具身智能深度专家。2026人形机器人格局频繁受访。聚焦本体/大脑/执行器/场景。"},
  linhaizuo:{zhName:"林海卓",title:"卓源亚洲创始合伙人 · 清华系",bio:"卓源亚洲创始合伙人。清华系AI+半导体。2024投松原/中科第五纪/影身/知有无界。最活跃具身种子投资人之一。"},

  dengfeng:{zhName:"邓锋",title:"北极光创始人 · NetScreen联创",bio:"硅谷联创NetScreen（$40亿售Juniper）。2005创办北极光。最受尊敬深科技VC。聚焦企业/半导体/AI/制造。"},

function applyLanguage(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Nav
  document.querySelector(".nav-title").textContent = t.navTitle;
  document.getElementById("search-input").placeholder = t.searchPlaceholder;
  document.getElementById("nav-stats").textContent = t.stats(scholars.length, connections.length);

  // Filter pills
  const pillMap = { all: t.filterAll, "china-vc": t.filterDL, "us-vc": t.filterNLP, early: t.filterRL, cvc: t.filterVision, angel: t.filterSafety };
  document.querySelectorAll(".filter-pill").forEach(btn => {
    btn.textContent = pillMap[btn.dataset.filter] || btn.textContent;
  });

  // Legend
  const legendLabels = document.querySelectorAll("#legend .legend-label");
  const legendTexts = [t.legendDeepMind, t.legendOpenAI, t.legendAnthropic, t.legendMeta, t.legendStanford, t.legendUniversity, t.legendStartup, t.legendCoauthor, t.legendAdvisor, t.legendCofounder, t.legendColleague];
  legendLabels.forEach((el, i) => { if (legendTexts[i]) el.textContent = legendTexts[i]; });

  const legendHeadings = document.querySelectorAll("#legend .legend-heading");
  if (legendHeadings[0]) legendHeadings[0].textContent = t.legendOrgs;
  if (legendHeadings[1]) legendHeadings[1].textContent = t.legendConns;

  // Detail panel section titles
  const sectionTitles = document.querySelectorAll(".detail-section-title");
  if (sectionTitles[0]) sectionTitles[0].textContent = t.sectionAbout;
  if (sectionTitles[1]) sectionTitles[1].textContent = t.sectionPapers;
  if (sectionTitles[2]) sectionTitles[2].textContent = t.sectionConnections;

  // Keyboard hints
  const hints = document.querySelectorAll(".hint-item");
  const hintTexts = [t.hintZoom, t.hintPan, t.hintDetails, t.hintClose];
  hints.forEach((el, i) => {
    const key = el.querySelector(".hint-key");
    if (key && hintTexts[i]) {
      el.innerHTML = "";
      el.appendChild(key);
      el.append(" " + hintTexts[i]);
    }
  });

  // Update graph node labels with Chinese names
  nodeGroups.selectAll(".node-name-label").text(d => {
    const zhData = scholarZh[d.id];
    if (lang === "zh" && zhData && zhData.zhName) return zhData.zhName;
    return d.name;
  });

  // If detail panel is open, refresh it
  if (document.getElementById("detail-panel").classList.contains("open") && window._currentDetailScholar) {
    openDetail(window._currentDetailScholar);
  }

  // Toggle buttons
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}

};

// Baidu Baike search names (Chinese name for baike lookup)
const baikeTitles = {};

// Photo cache
const photoCache = {};

async function fetchPhoto(scholarId) {
  if (photoCache[scholarId]) return photoCache[scholarId];

  // 1. Try Wikipedia first
  const wiki = wikiTitles[scholarId];
  if (wiki) {
    try {
      const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source || null;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }

  // 2. Try Chinese Wikipedia (zh.wikipedia)
  const bkName = baikeTitles[scholarId];
  if (bkName && !bkName.includes('_')) {
    try {
      const resp = await fetch(`https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bkName)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source || null;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }

  return null;
}

// openDetail with i18n support
function openDetail(d) {
  const panel = document.getElementById("detail-panel");
  panel.classList.add("open");
  window._currentDetailScholar = d;

  // Avatar — always reset to placeholder first
  const initials = d.name.split(" ").map(w => w[0]).join("").slice(0, 2);
  const oldAvatar = document.getElementById("detail-avatar");
  const placeholder = document.createElement("div");
  placeholder.className = "detail-avatar-placeholder";
  placeholder.id = "detail-avatar";
  placeholder.innerHTML = `<span>${initials}</span>`;
  oldAvatar.replaceWith(placeholder);

  // Load photo
  const currentId = d.id;

function renderGeoMap() {
  const svg = document.getElementById("geo-svg");
  if (!svg) return;

  // Count per city
  const counts = {};
  Object.values(cityMap).forEach(city => {
    counts[city] = (counts[city] || 0) + 1;
  });

  // Draw simplified China outline
  const chinaPath = "M60,20 L80,15 L100,18 L120,12 L140,20 L160,25 L175,35 L180,50 L175,65 L170,75 L175,85 L165,95 L160,105 L150,110 L145,120 L135,130 L130,140 L120,145 L110,140 L100,135 L90,140 L80,135 L70,125 L60,120 L50,110 L45,95 L40,80 L42,65 L45,50 L50,35 Z";

  let html = `<path class="geo-outline" d="M15,20 L55,15 L60,40 L50,60 L30,55 L15,40 Z"/><path class="geo-outline" d="M100,20 L180,15 L185,50 L175,70 L165,100 L140,105 L110,95 L100,80 L95,50 Z"/><path class="geo-outline" d="M170,35 L185,33 L187,50 L180,55 Z"/>`;

  // Draw bubbles
  Object.entries(cityPositions).forEach(([city, pos]) => {
    const count = counts[city] || 0;
    if (count === 0) return;
    const r = Math.max(Math.min(Math.sqrt(count) * 5, 22), 6);
    html += `<circle class="geo-bubble" cx="${pos.x}" cy="${pos.y}" r="${r}"/>`;
    html += `<text class="geo-count" x="${pos.x}" y="${pos.y + 2.5}">${count}</text>`;
    const labelY = pos.y + r + 9;
    const label = currentLang === "zh" ? pos.label : pos.labelEn;
    html += `<text class="geo-label" x="${pos.x}" y="${labelY}">${label}</text>`;
  });

  svg.innerHTML = html;

  // Update heading
  const heading = document.getElementById("geo-heading");
  if (heading) heading.textContent = currentLang === "zh" ? "投资人地域分布" : "Location Distribution";
}

// DEEP LINK — open detail panel from URL hash (e.g. #shennp)
// ===================================================================
function handleHashLink() {
  const hash = window.location.hash.replace('#', '');
  if (!hash) return;
  const target = scholars.find(s => s.id === hash);
  if (!target) return;

  // Try multiple times until node position is ready
  let attempts = 0;
  const maxAttempts = 20;
  function tryOpen() {
    attempts++;
    if (target.x !== undefined && target.y !== undefined && !isNaN(target.x)) {
      openDetail(target);
      const W = window.innerWidth, H = window.innerHeight - 48;
      svg.transition().duration(800).ease(d3.easeCubicInOut).call(
        zoomBehavior.transform,
        d3.zoomIdentity.translate(W/2 - target.x * 1.2, H/2 - target.y * 1.2).scale(1.2)
      );
      // Flash the node
      nodeGroups.filter(d => d.id === hash).select(".node-glow")
        .transition().duration(300).attr("opacity", 0.8)
        .transition().duration(300).attr("opacity", 0.15);
    } else if (attempts < maxAttempts) {
      setTimeout(tryOpen, 500);
    }
  }
  // Start trying after initial render
  setTimeout(tryOpen, 1000);
}
handleHashLink();
window.addEventListener("hashchange", () => { handleHashLink(); });
