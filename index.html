<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tech Investor Graph</title>
<script defer src="https://cloud.umami.is/script.js" data-website-id="d325eb73-0d8f-4529-aa76-f32ebfd92226"></script>
<script defer src="https://cloud.umami.is/script.js" data-website-id="d325eb73-0d8f-4529-aa76-f32ebfd92226"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
/* ===== Apple Design System Foundation ===== */
@font-face {
  font-family: 'SF Pro Display';
  src: local('SF Pro Display'), local('.SFNSDisplay'), local('SFProDisplay-Regular'),
       local('Helvetica Neue'), local('Helvetica');
  font-weight: 100 900;
}
@font-face {
  font-family: 'SF Pro Text';
  src: local('SF Pro Text'), local('.SFNSText'), local('SFProText-Regular'),
       local('Helvetica Neue'), local('Helvetica');
  font-weight: 100 900;
}

:root {
  /* Apple Colors */
  --apple-black: #000000;
  --apple-white: #ffffff;
  --apple-gray-bg: #f5f5f7;
  --apple-near-black: #1d1d1f;
  --apple-blue: #0071e3;
  --apple-link-blue: #0066cc;
  --apple-link-blue-dark: #2997ff;
  --apple-text-secondary: rgba(255, 255, 255, 0.56);
  --apple-text-tertiary: rgba(255, 255, 255, 0.32);
  --apple-surface-dark-1: #161617;
  --apple-surface-dark-2: #1c1c1e;
  --apple-surface-dark-3: #2c2c2e;

  /* Organization Colors вАФ desaturated, Apple-refined */
  --org-china-top: #64d2ff;
  --org-china-early: #30d158;
  --org-corporate: #ff6482;
  --org-us-other: #5e9eff;
  --org-cvc: #ff9f0a;
  --org-us-top: #bf5af2;
  --org-angel: #ffd60a;
  --org-independent: #98989d;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: var(--apple-black);
  color: var(--apple-white);
  font-family: 'SF Pro Text', -apple-system, BlinkMacSystemFont, 'Helvetica Neue', 'Helvetica', 'Arial', sans-serif;
  overflow-x: hidden;
  overflow-y: auto;
  min-height: 100vh;
  width: 100vw;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== Navigation вАФ Apple Glass ===== */
#nav-bar {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 48px;
  background: rgba(0, 0, 0, 0.72);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  display: flex;
  align-items: center;
  padding: 0 24px;
  z-index: 1000;
  border-bottom: 0.5px solid rgba(255, 255, 255, 0.08);
}
.nav-title {
  font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, sans-serif;
  font-size: 17px;
  font-weight: 600;
  letter-spacing: -0.374px;
  color: var(--apple-white);
  white-space: nowrap;
}
.nav-separator {
  width: 0.5px;
  height: 20px;
  background: rgba(255, 255, 255, 0.16);
  margin: 0 16px;
}
.nav-stats {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  color: var(--apple-text-secondary);
  white-space: nowrap;
  flex-shrink: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  min-width: 0;
  max-width: 120px;
}

/* Search вАФ Apple Style */
.nav-search-wrapper {
  margin-left: 16px;
  position: relative;
  flex-shrink: 1;
  min-width: 120px;
}
#search-input {
  width: 180px;
  height: 32px;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  border-radius: 8px;
  color: var(--apple-white);
  padding: 0 12px 0 32px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  outline: none;
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
}
#search-input::placeholder {
  color: rgba(255, 255, 255, 0.32);
}
#search-input:focus {
  width: 280px;
  background: rgba(255, 255, 255, 0.15);
  box-shadow: 0 0 0 2px var(--apple-blue);
}
.search-icon {
  position: absolute;
  left: 10px;
  top: 50%;
  transform: translateY(-50%);
  color: rgba(255, 255, 255, 0.32);
  font-size: 13px;
  pointer-events: none;
}

/* Filter Pills вАФ Apple Pill CTA */
.filter-group {
  display: flex;
  gap: 6px;
  margin-left: 16px;
  flex-shrink: 1;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.filter-pill {
  padding: 5px 14px;
  border-radius: 980px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  line-height: 1.33;
  cursor: pointer;
  border: 1px solid rgba(255, 255, 255, 0.16);
  background: transparent;
  color: rgba(255, 255, 255, 0.56);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  white-space: nowrap;
}
.filter-pill:hover {
  border-color: rgba(255, 255, 255, 0.32);
  color: rgba(255, 255, 255, 0.8);
}
.filter-pill.active {
  background: var(--apple-blue);
  border-color: var(--apple-blue);
  color: var(--apple-white);
}
.nav-spacer { flex: 1; }

/* Language Toggle вАФ Apple Segmented Control */
.lang-toggle {
  display: flex;
  background: rgba(255, 255, 255, 0.06);
  border-radius: 8px;
  padding: 2px;
  gap: 0;
  margin-left: 12px;
}
.lang-btn {
  padding: 4px 12px;
  border-radius: 6px;
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.12px;
  cursor: pointer;
  border: none;
  background: transparent;
  color: rgba(255, 255, 255, 0.4);
  transition: all 0.25s cubic-bezier(0.25, 0.1, 0.25, 1);
  white-space: nowrap;
}
.lang-btn:hover {
  color: rgba(255, 255, 255, 0.64);
}
.lang-btn.active {
  background: rgba(255, 255, 255, 0.12);
  color: var(--apple-white);
}

/* ===== Graph Canvas ===== */
#graph-container {
  position: relative;
  margin-top: 48px;
  height: calc(100vh - 168px);
  min-height: 480px;
  width: 100%;
}
body.no-insights #graph-container {
  height: calc(100vh - 48px);
  min-height: unset;
}
#graph-container svg {
  width: 100%;
  height: 100%;
  display: block;
}

/* ===== Legend вАФ Bottom Left ===== */
#legend {
  position: fixed;
  bottom: 16px;
  left: 24px;
  z-index: 100;
  pointer-events: all;
}
.legend-card {
  background: rgba(28, 28, 30, 0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-radius: 12px;
  padding: 16px 20px;
  min-width: 160px;
}
.legend-heading {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--apple-text-tertiary);
  margin-bottom: 10px;
}
.legend-heading:not(:first-child) { margin-top: 14px; }
.legend-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 3px 0;
  cursor: default;
}
.legend-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.legend-line-sample {
  width: 16px;
  height: 0;
  flex-shrink: 0;
}
.legend-label {
  font-size: 12px;
  font-weight: 400;
  letter-spacing: -0.12px;
  color: rgba(255, 255, 255, 0.56);
}

/* ===== Detail Panel вАФ Apple Sidebar ===== */
#detail-panel {
  position: fixed;
  top: 48px;
  right: 0;
  width: 380px;
  height: calc(100vh - 48px);
  background: var(--apple-surface-dark-1);
  border-left: 0.5px solid rgba(255, 255, 255, 0.08);
  z-index: 500;
  transform: translateX(100%);
  transition: transform 0.4s cubic-bezier(0.25, 0.1, 0.25, 1);
  overflow-y: auto;
  overflow-x: hidden;
}
#detail-panel.open {
  transform: translateX(0);
}
#detail-panel::-webkit-scrollbar { width: 0; }

.detail-close {
  position: absolute;
  top: 16px;
  right: 16px;
  width: 28px;
  height: 28px;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.1);
  border: none;
  color: rgba(255, 255, 255, 0.56);
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
  z-index: 1;
}
.detail-close:hover {
  background: rgba(255, 255, 255, 0.2);
}

.detail-header {
  padding: 40px 24px 20px;
  display: flex;
  gap: 16px;
  align-items: flex-start;
}
.detail-avatar {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  object-fit: cover;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.08);
}
.detail-avatar.loading {
  background: linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.08) 50%, rgba(255,255,255,0.04) 100%);
  background-size: 200% 200%;
  animation: shimmer 1.5s ease infinite;
}
@keyframes shimmer {
  0% { background-position: 100% 100%; }
  100% { background-position: 0% 0%; }
}
.detail-avatar-placeholder {
  width: 72px;
  height: 72px;
  border-radius: 50%;
  flex-shrink: 0;
  background: rgba(255, 255, 255, 0.06);
  border: 2px solid rgba(255, 255, 255, 0.08);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  font-weight: 600;
  color: rgba(255, 255, 255, 0.2);
  font-family: 'SF Pro Display', -apple-system, sans-serif;
}
.detail-header-info {
  flex: 1;
  min-width: 0;
}
.detail-name {
  font-family: 'SF Pro Display', -apple-system, sans-serif;
  font-size: 28px;
  font-weight: 600;
  letter-spacing: 0.196px;
  line-height: 1.14;
  color: var(--apple-white);
  margin-bottom: 6px;
}
.detail-title {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  line-height: 1.43;
  color: var(--apple-text-secondary);
}
.detail-org-badge {
  display: inline-block;
  margin-top: 12px;
  padding: 4px 12px;
  border-radius: 980px;
  font-size: 12px;
  font-weight: 500;
  letter-spacing: -0.12px;
}

/* Style Tags */
.detail-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 5px;
  margin-top: 10px;
}
.detail-tag {
  display: inline-block;
  padding: 3px 9px;
  border-radius: 980px;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: -0.08px;
  background: rgba(41, 151, 255, 0.12);
  color: var(--apple-link-blue-dark);
  border: 0.5px solid rgba(41, 151, 255, 0.2);
}

.detail-section {
  padding: 20px 24px;
  border-top: 0.5px solid rgba(255, 255, 255, 0.06);
}
.detail-section-title {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;
  color: var(--apple-text-tertiary);
  margin-bottom: 12px;
}
.detail-section p {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  line-height: 1.5;
  color: rgba(255, 255, 255, 0.72);
}

/* Paper items */
.paper-entry {
  padding: 8px 0;
  display: flex;
  gap: 8px;
  align-items: baseline;
}
.paper-year {
  font-size: 12px;
  font-weight: 600;
  letter-spacing: -0.12px;
  color: var(--apple-link-blue-dark);
  flex-shrink: 0;
  min-width: 36px;
}
.paper-title {
  font-size: 13px;
  font-weight: 400;
  letter-spacing: -0.12px;
  line-height: 1.38;
  color: rgba(255, 255, 255, 0.64);
}

/* Connection items */
.conn-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 0;
  cursor: pointer;
  border-radius: 8px;
  margin: 0 -8px;
  padding-left: 8px;
  padding-right: 8px;
  transition: background 0.2s;
}
.conn-entry:hover {
  background: rgba(255, 255, 255, 0.04);
}
.conn-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  flex-shrink: 0;
}
.conn-info {
  flex: 1;
  min-width: 0;
}
.conn-name {
  font-size: 14px;
  font-weight: 400;
  letter-spacing: -0.224px;
  color: var(--apple-white);
}
.conn-relation {
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
  margin-top: 1px;
}
.conn-type-badge {
  font-size: 10px;
  font-weight: 500;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
  padding: 2px 8px;
  border-radius: 980px;
  border: 0.5px solid rgba(255, 255, 255, 0.08);
  flex-shrink: 0;
}

/* ===== SVG Styles ===== */

/* Links вАФ 4 tiers of visual weight */
.link-line {
  transition: stroke-opacity 0.35s ease, stroke-width 0.35s ease;
  stroke-linecap: round;
}
/* Cofounder: strongest bond, solid bright green */
.link-line.type-cofounder {
  stroke: #30d158;
  stroke-width: 2.5;
  stroke-opacity: 0.5;
}
/* Coauthor: strong academic tie, solid blue */
.link-line.type-former-colleague {
  stroke: #2997ff;
  stroke-width: 1.8;
  stroke-opacity: 0.35;
}
/* Advisor: mentor line, dashed cyan */
.link-line.type-mentor {
  stroke: #64d2ff;
  stroke-width: 1.8;
  stroke-opacity: 0.4;
  stroke-dasharray: 8 5;
}
/* Colleague: weakest, subtle dotted */
.link-line.type-industry-peer {
  stroke: rgba(255, 255, 255, 0.5);
  stroke-width: 0.8;
  stroke-opacity: 0.15;
  stroke-dasharray: 2 6;
}

.node-group {
  transition: opacity 0.3s ease;
}
.node-glow {
  transition: opacity 0.3s ease;
}
.node-label {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-weight: 500;
  fill: rgba(255, 255, 255, 0.64);
  text-anchor: middle;
  pointer-events: none;
  transition: fill 0.3s, font-size 0.3s;
}

/* Dim / Highlight states */
.node-group.dimmed { opacity: 0.06; }
.node-group.highlighted { opacity: 1; }
.node-group.highlighted .node-label {
  fill: var(--apple-white);
  font-weight: 600;
}
.node-group.highlighted .node-glow { opacity: 0.5; }

.link-line.dimmed { stroke-opacity: 0.015 !important; }
.link-line.highlighted.type-cofounder { stroke-opacity: 0.85 !important; stroke-width: 3.5px !important; }
.link-line.highlighted.type-former-colleague { stroke-opacity: 0.75 !important; stroke-width: 3px !important; }
.link-line.highlighted.type-mentor { stroke-opacity: 0.7 !important; stroke-width: 2.5px !important; }
.link-line.highlighted.type-industry-peer { stroke-opacity: 0.5 !important; stroke-width: 1.5px !important; stroke-dasharray: none !important; }

/* ===== Tooltip ===== */
#tooltip {
  position: fixed;
  pointer-events: none;
  background: rgba(28, 28, 30, 0.95);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border-radius: 8px;
  padding: 8px 12px;
  z-index: 2000;
  opacity: 0;
  transition: opacity 0.15s;
  max-width: 240px;
}
#tooltip.visible { opacity: 1; }
.tooltip-name {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: -0.12px;
  color: var(--apple-white);
}
.tooltip-org {
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-secondary);
  margin-top: 2px;
}

/* ===== Graph switcher dropdown (replaces top quick-links bar) ===== */
.graph-switcher { position: relative; display: flex; align-items: center; }
.graph-switcher-trigger {
  display: flex; align-items: center; gap: 6px;
  background: transparent; border: none; cursor: pointer;
  padding: 6px 10px; margin: 0 -4px; border-radius: 8px;
  font-family: inherit; color: inherit;
  transition: background 0.15s;
}
.graph-switcher-trigger:hover { background: rgba(255, 255, 255, 0.06); }
.graph-switcher-trigger .nav-title { margin: 0; }
.graph-chevron {
  font-size: 9px;
  color: rgba(255, 255, 255, 0.45);
  transition: transform 0.2s;
  line-height: 1;
}
.graph-switcher.open .graph-chevron { transform: rotate(180deg); }
.graph-dropdown {
  position: absolute;
  top: calc(100% + 6px);
  left: 0;
  min-width: 180px;
  background: rgba(28, 28, 30, 0.92);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border: 0.5px solid rgba(255, 255, 255, 0.12);
  border-radius: 10px;
  padding: 6px;
  display: flex;
  flex-direction: column;
  gap: 1px;
  z-index: 1100;
  box-shadow: 0 12px 32px rgba(0, 0, 0, 0.45);
  animation: graph-dropdown-fade 0.15s ease;
}
@keyframes graph-dropdown-fade {
  from { opacity: 0; transform: translateY(-4px); }
  to   { opacity: 1; transform: translateY(0); }
}
.graph-dropdown[hidden] { display: none; }
.graph-dropdown-item {
  display: block;
  padding: 8px 12px;
  font-size: 13px;
  color: rgba(255, 255, 255, 0.78);
  text-decoration: none;
  border-radius: 6px;
  white-space: nowrap;
  font-family: inherit;
}
.graph-dropdown-item:hover { background: rgba(255, 255, 255, 0.08); color: #fff; }
.graph-dropdown-item.active {
  color: var(--apple-link-blue-dark);
  background: rgba(41, 151, 255, 0.1);
}
.graph-dropdown-sep {
  height: 1px;
  background: rgba(255, 255, 255, 0.08);
  margin: 4px 6px;
}

/* Subscribe button in nav-bar */
.nav-subscribe-btn {
  padding: 6px 16px;
  background: #fff;
  color: #000;
  border: none;
  border-radius: 980px;
  font-family: inherit;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  letter-spacing: -0.12px;
  white-space: nowrap;
  margin-right: 8px;
  transition: background 0.2s;
}
.nav-subscribe-btn:hover { background: rgba(255, 255, 255, 0.85); }

/* Hamburger (mobile only) */
.nav-hamburger {
  display: none;
  width: 32px; height: 32px;
  background: transparent;
  border: none;
  color: rgba(255, 255, 255, 0.75);
  font-size: 22px;
  line-height: 1;
  cursor: pointer;
  border-radius: 6px;
  margin-right: 6px;
  font-family: inherit;
  padding: 0;
  align-items: center;
  justify-content: center;
}
.nav-hamburger:hover { background: rgba(255, 255, 255, 0.06); }

/* Mobile responsive: collapse extras into hamburger drawer */
@media (max-width: 768px) {
  .nav-hamburger { display: flex; }
  .nav-separator, .nav-stats { display: none; }
  .nav-search-wrapper, .filter-group, .lang-toggle { display: none; }
  .nav-subscribe-btn { padding: 5px 12px; font-size: 11px; margin-right: 4px; }

  body.mobile-menu-open #nav-bar {
    height: auto !important;
    padding: 8px 12px 14px !important;
    flex-wrap: wrap;
    align-items: center;
  }
  body.mobile-menu-open .nav-search-wrapper,
  body.mobile-menu-open .filter-group,
  body.mobile-menu-open .lang-toggle {
    display: flex;
    width: 100%;
    margin: 8px 0 0;
    flex-wrap: wrap;
    gap: 6px;
  }
  body.mobile-menu-open .nav-search-wrapper { order: 10; }
  body.mobile-menu-open .filter-group { order: 11; }
  body.mobile-menu-open .lang-toggle { order: 12; justify-content: flex-end; }
}

#keyboard-hint {
  position: fixed;
  bottom: 16px;
  right: 24px;
  z-index: 100;
  display: flex;
  gap: 12px;
}
.hint-item {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  letter-spacing: -0.08px;
  color: var(--apple-text-tertiary);
}
.hint-key {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  min-width: 20px;
  height: 20px;
  padding: 0 5px;
  border-radius: 4px;
  background: rgba(255, 255, 255, 0.06);
  border: 0.5px solid rgba(255, 255, 255, 0.1);
  font-size: 10px;
  color: rgba(255, 255, 255, 0.4);
}

/* ===== Mobile Responsive ===== */
/* ===== Mini Map вАФ Bottom Right ===== */
#geo-map {
  position: fixed;
  bottom: 16px;
  right: 24px;
  z-index: 100;
  width: 220px;
  pointer-events: none;
}
.geo-card {
  background: rgba(28, 28, 30, 0.88);
  backdrop-filter: saturate(180%) blur(20px);
  -webkit-backdrop-filter: saturate(180%) blur(20px);
  border-radius: 12px;
  padding: 12px 14px 8px;
}
.geo-heading {
  font-family: 'SF Pro Text', -apple-system, sans-serif;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.6px;
  text-transform: uppercase;

// ===================================================================
// D3 GRAPH
// ===================================================================
const W = window.innerWidth;
const H = window.innerHeight - 48;

const svg = d3.select("#main-svg");
const g = svg.append("g");

// Zoom
const zoomBehavior = d3.zoom().scaleExtent([0.15, 5])
  .on("zoom", ({transform}) => g.attr("transform", transform));
svg.call(zoomBehavior);

// Glow filter
const defs = svg.append("defs");
const glowFilter = defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
glowFilter.append("feGaussianBlur").attr("stdDeviation","5").attr("result","blur");
const glowMerge = glowFilter.append("feMerge");
glowMerge.append("feMergeNode").attr("in","blur");
glowMerge.append("feMergeNode").attr("in","SourceGraphic");

// Force simulation
const simulation = d3.forceSimulation(scholars)
  .force("link", d3.forceLink(connections).id(d=>d.id).distance(d=>{
    if(d.type==="cofounder")return 70;if(d.type==="coauthor")return 95;if(d.type==="advisor")return 110;return 140;
  }).strength(d=>{
    if(d.type==="cofounder")return 0.8;if(d.type==="coauthor")return 0.4;if(d.type==="advisor")return 0.5;return 0.12;
  }))
  .force("charge", d3.forceManyBody().strength(-380))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(36))
  .force("x", d3.forceX(W/2).strength(0.03))
  .force("y", d3.forceY(H/2).strength(0.03));

// Links вАФ use <path> for curved lines
const linkG = g.append("g");
const linkLines = linkG.selectAll("path").data(connections).join("path")
  .attr("class", d => `link-line type-${d.type}`)
  .attr("fill", "none");

// Nodes
const nodeG = g.append("g");
const nodeGroups = nodeG.selectAll("g").data(scholars).join("g")
  .attr("class","node-group")
  .call(d3.drag().on("start",(e,d)=>{if(!e.active)simulation.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y;})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y;})
    .on("end",(e,d)=>{if(!e.active)simulation.alphaTarget(0);d.fx=null;d.fy=null;}));

function nodeSize(d){
  const c=connections.filter(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    return s===d.id||t===d.id;
  }).length;
  return Math.min(Math.max(c*1.3+4,5),16);
}

// Glow
nodeGroups.append("circle").attr("class","node-glow")
  .attr("r",d=>nodeSize(d)+8)
  .attr("fill",d=>getColor(d.org))
  .attr("opacity",0.15)
  .attr("filter","url(#glow)");

// Circle
nodeGroups.append("circle").attr("class","node-circle")
  .attr("r",d=>nodeSize(d))
  .attr("fill",d=>getColor(d.org))
  .attr("stroke","rgba(255,255,255,0.08)")
  .attr("stroke-width",0.5)
  .style("cursor","pointer");

// Labels вАФ name + org
nodeGroups.append("text").attr("class","node-label node-name-label")
  .attr("dy",d=>nodeSize(d)+13)
  .attr("font-size","10px")
  .attr("letter-spacing","-0.08px")
  .text(d=>d.name);
nodeGroups.append("text").attr("class","node-label node-org-label")
  .attr("dy",d=>nodeSize(d)+23)
  .attr("font-size","8px")
  .attr("letter-spacing","-0.06px")
  .attr("fill","rgba(255,255,255,0.35)")
  .text(d=>d.org);

// Tick вАФ straight lines
simulation.on("tick",()=>{
  linkLines.attr("d", d => `M${d.source.x},${d.source.y} L${d.target.x},${d.target.y}`);
  nodeGroups.attr("transform",d=>`translate(${d.x},${d.y})`);
});

// INTERACTIONS
// ===================================================================
const tooltip = document.getElementById("tooltip");

// Hover highlight
nodeGroups.on("mouseenter",(event,d)=>{
  const connected = new Set([d.id]);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(s===d.id)connected.add(t);if(t===d.id)connected.add(s);
  });
  nodeGroups.classed("dimmed",n=>!connected.has(n.id)).classed("highlighted",n=>connected.has(n.id));
  linkLines.classed("dimmed",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s!==d.id&&t!==d.id;
  }).classed("highlighted",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return s===d.id||t===d.id;
  });
  // Tooltip
  const zhTip = scholarZh[d.id];
  document.getElementById("tooltip-name").textContent = (currentLang === "zh" && zhTip && zhTip.zhName) ? zhTip.zhName + "  " + d.name : d.name;
  document.getElementById("tooltip-org").textContent=d.org;
  tooltip.classList.add("visible");
}).on("mousemove",(event)=>{
  tooltip.style.left=(event.clientX+14)+"px";
  tooltip.style.top=(event.clientY-10)+"px";
}).on("mouseleave",()=>{
  nodeGroups.classed("dimmed",false).classed("highlighted",false);
  linkLines.classed("dimmed",false).classed("highlighted",false);
  tooltip.classList.remove("visible");
});

// SEARCH
// ===================================================================
document.getElementById("search-input").addEventListener("input",e=>{
  const q=e.target.value.toLowerCase().trim();
  if(!q){
    nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;
  }
  const match=new Set();
  scholars.forEach(s=>{
    if(s.name.toLowerCase().includes(q)||s.org.toLowerCase().includes(q)||s.title.toLowerCase().includes(q))match.add(s.id);
  });
  const expanded=new Set(match);
  connections.forEach(c=>{
    const s=typeof c.source==='object'?c.source.id:c.source;
    const t=typeof c.target==='object'?c.target.id:c.target;
    if(match.has(s))expanded.add(t);if(match.has(t))expanded.add(s);
  });
  nodeGroups.style("opacity",d=>match.has(d.id)?1:expanded.has(d.id)?0.4:0.04);
  linkLines.style("opacity",l=>{
    const s=typeof l.source==='object'?l.source.id:l.source;
    const t=typeof l.target==='object'?l.target.id:l.target;
    return(match.has(s)||match.has(t))?0.5:0.02;
  });
});

// ===================================================================
// FILTER PILLS
// ===================================================================
document.querySelectorAll(".filter-pill").forEach(btn=>{
  btn.addEventListener("click",()=>{
    document.querySelectorAll(".filter-pill").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    const f=btn.dataset.filter;
    if(f==="all"){nodeGroups.style("opacity",null);linkLines.style("opacity",null);return;}
    const match=new Set();
    scholars.forEach(s=>{if(s.field&&s.field.includes(f))match.add(s.id);});
    nodeGroups.style("opacity",d=>match.has(d.id)?1:0.04);
    linkLines.style("opacity",l=>{
      const s=typeof l.source==='object'?l.source.id:l.source;
      const t=typeof l.target==='object'?l.target.id:l.target;
      return(match.has(s)&&match.has(t))?0.5:0.02;
    });
  });
});

function applyLanguage(lang) {
  currentLang = lang;
  const t = i18n[lang];

  // Nav
  document.querySelector(".nav-title").textContent = t.navTitle;
  document.getElementById("search-input").placeholder = t.searchPlaceholder;
  document.getElementById("nav-stats").textContent = t.stats(scholars.length, connections.length);

  // Filter pills
  const pillMap = { all: t.filterAll, "china-vc": t.filterDL, "us-vc": t.filterNLP, early: t.filterRL, cvc: t.filterVision, angel: t.filterSafety };
  document.querySelectorAll(".filter-pill").forEach(btn => {
    btn.textContent = pillMap[btn.dataset.filter] || btn.textContent;
  });

  // Legend
  const legendLabels = document.querySelectorAll("#legend .legend-label");
  const legendTexts = [t.legendDeepMind, t.legendOpenAI, t.legendAnthropic, t.legendMeta, t.legendStanford, t.legendUniversity, t.legendStartup, t.legendCoauthor, t.legendAdvisor, t.legendCofounder, t.legendColleague];
  legendLabels.forEach((el, i) => { if (legendTexts[i]) el.textContent = legendTexts[i]; });

  const legendHeadings = document.querySelectorAll("#legend .legend-heading");
  if (legendHeadings[0]) legendHeadings[0].textContent = t.legendOrgs;
  if (legendHeadings[1]) legendHeadings[1].textContent = t.legendConns;

  // Detail panel section titles
  const sectionTitles = document.querySelectorAll(".detail-section-title");
  if (sectionTitles[0]) sectionTitles[0].textContent = t.sectionAbout;
  if (sectionTitles[1]) sectionTitles[1].textContent = t.sectionPapers;
  if (sectionTitles[2]) sectionTitles[2].textContent = t.sectionConnections;

  // Keyboard hints
  const hints = document.querySelectorAll(".hint-item");
  const hintTexts = [t.hintZoom, t.hintPan, t.hintDetails, t.hintClose];
  hints.forEach((el, i) => {
    const key = el.querySelector(".hint-key");
    if (key && hintTexts[i]) {
      el.innerHTML = "";
      el.appendChild(key);
      el.append(" " + hintTexts[i]);
    }
  });

  // Update graph node labels with Chinese names
  nodeGroups.selectAll(".node-name-label").text(d => {
    const zhData = scholarZh[d.id];
    if (lang === "zh" && zhData && zhData.zhName) return zhData.zhName;
    return d.name;
  });

  // If detail panel is open, refresh it
  if (document.getElementById("detail-panel").classList.contains("open") && window._currentDetailScholar) {
    openDetail(window._currentDetailScholar);
  }

  // Toggle buttons
  document.querySelectorAll(".lang-btn").forEach(b => b.classList.toggle("active", b.dataset.lang === lang));
}

// Wikipedia article title mapping for avatar fetching
const wikiTitles = {
  shennp:"Shen_Nanpeng",zhanglei:"Zhang_Lei_(investor)",xiongxg:"Xiong_Xiaoge",
  leijun:"Lei_Jun",marca16z:"Marc_Andreessen",peterthiel:"Peter_Thiel",
  jeffbezos:"Jeff_Bezos",jensenhuang:"Jensen_Huang",masason:"Masayoshi_Son",
  vinodkhosla:"Vinod_Khosla",luqi2:"Qi_Lu",
  ericschmidt:"Eric_Schmidt",reidhoffman:"Reid_Hoffman",samaltman:"Sam_Altman",roelofbotha:"Roelof_Botha",
};

// Baidu Baike search names (Chinese name for baike lookup)
const baikeTitles = {};

// Photo cache
const photoCache = {};

async function fetchPhoto(scholarId) {
  if (photoCache[scholarId]) return photoCache[scholarId];

  // 1. Try Wikipedia first
  const wiki = wikiTitles[scholarId];
  if (wiki) {
    try {
      const resp = await fetch(`https://en.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(wiki)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source || null;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }

  // 2. Try Chinese Wikipedia (zh.wikipedia)
  const bkName = baikeTitles[scholarId];
  if (bkName && !bkName.includes('_')) {
    try {
      const resp = await fetch(`https://zh.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(bkName)}`);
      if (resp.ok) {
        const data = await resp.json();
        const url = data.thumbnail?.source || null;
        if (url) { photoCache[scholarId] = url; return url; }
      }
    } catch(e) {}
  }

  return null;
}

  const placeholder = document.createElement("div");

  placeholder.innerHTML = `<span>${initials}</span>`;

  const sectionTitles = document.querySelectorAll(".detail-section-title");
  if (sectionTitles[0]) sectionTitles[0].textContent = t.sectionAbout;
  if (sectionTitles[1]) sectionTitles[1].textContent = t.sectionPapers;
  if (sectionTitles[2]) sectionTitles[2].textContent = t.sectionConnections;

  // Connections
  const connsEl = document.getElementById("detail-connections");
  const related = connections.filter(c => {
    const s = typeof c.source === 'object' ? c.source.id : c.source;
    const tt = typeof c.target === 'object' ? c.target.id : c.target;
    return s === d.id || tt === d.id;
  });
  connsEl.innerHTML = related.map(c => {
    const s = typeof c.source === 'object' ? c.source.id : c.source;
    const tt = typeof c.target === 'object' ? c.target.id : c.target;
    const oid = s === d.id ? tt : s;
    const o = scholars.find(sc => sc.id === oid);
    if (!o) return '';
    const label = currentLang === "zh" ? (connLabelZh[c.label] || c.label) : c.label;
    const typeBadge = t.typeLabels[c.type];
    return `<div class="conn-entry" data-id="${o.id}">
      <div class="conn-dot" style="background:${getColor(o.org)}"></div>
      <div class="conn-info"><div class="conn-name">${(currentLang === "zh" && scholarZh[o.id] && scholarZh[o.id].zhName) ? scholarZh[o.id].zhName + "  " + o.name : o.name}</div><div class="conn-relation">${label}</div></div>
      <span class="conn-type-badge">${typeBadge}</span>
    </div>`;
  }).join("");

  connsEl.querySelectorAll(".conn-entry").forEach(el => {
    el.addEventListener("click", () => {
      const target = scholars.find(s => s.id === el.dataset.id);
      if (target) {
        openDetail(target);
        const tr = d3.zoomTransform(svg.node());
        svg.transition().duration(600).ease(d3.easeCubicInOut).call(
          zoomBehavior.transform,
          d3.zoomIdentity.translate(W / 2 - target.x * tr.k, H / 2 - target.y * tr.k).scale(tr.k)
        );
      }
    });
  });
};

function renderGeoMap() {
  const svg = document.getElementById("geo-svg");
  if (!svg) return;

  // Count per city
  const counts = {};
  Object.values(cityMap).forEach(city => {
    counts[city] = (counts[city] || 0) + 1;
  });

  // Draw simplified China outline
  const chinaPath = "M60,20 L80,15 L100,18 L120,12 L140,20 L160,25 L175,35 L180,50 L175,65 L170,75 L175,85 L165,95 L160,105 L150,110 L145,120 L135,130 L130,140 L120,145 L110,140 L100,135 L90,140 L80,135 L70,125 L60,120 L50,110 L45,95 L40,80 L42,65 L45,50 L50,35 Z";

  let html = `<path class="geo-outline" d="M15,20 L55,15 L60,40 L50,60 L30,55 L15,40 Z"/><path class="geo-outline" d="M100,20 L180,15 L185,50 L175,70 L165,100 L140,105 L110,95 L100,80 L95,50 Z"/><path class="geo-outline" d="M170,35 L185,33 L187,50 L180,55 Z"/>`;

  // Draw bubbles
  Object.entries(cityPositions).forEach(([city, pos]) => {
    const count = counts[city] || 0;
    if (count === 0) return;
    const r = Math.max(Math.min(Math.sqrt(count) * 5, 22), 6);
    html += `<circle class="geo-bubble" cx="${pos.x}" cy="${pos.y}" r="${r}"/>`;
    html += `<text class="geo-count" x="${pos.x}" y="${pos.y + 2.5}">${count}</text>`;
    const labelY = pos.y + r + 9;
    const label = currentLang === "zh" ? pos.label : pos.labelEn;
    html += `<text class="geo-label" x="${pos.x}" y="${labelY}">${label}</text>`;
  });

  svg.innerHTML = html;

  // Update heading
  const heading = document.getElementById("geo-heading");
  if (heading) heading.textContent = currentLang === "zh" ? "жКХиµДдЇЇеЬ∞еЯЯеИЖеЄГ" : "Location Distribution";
}

// ===================================================================
// DEEP LINK вАФ open detail panel from URL hash (e.g. #shennp)
// ===================================================================
function handleHashLink() {
  const hash = window.location.hash.replace('#', '');
  if (!hash) return;
  const target = scholars.find(s => s.id === hash);
  if (!target) return;

  // Try multiple times until node position is ready
  let attempts = 0;
  const maxAttempts = 20;
  function tryOpen() {
    attempts++;
    if (target.x !== undefined && target.y !== undefined && !isNaN(target.x)) {
      openDetail(target);
      const W = window.innerWidth, H = window.innerHeight - 48;
      svg.transition().duration(800).ease(d3.easeCubicInOut).call(
        zoomBehavior.transform,
        d3.zoomIdentity.translate(W/2 - target.x * 1.2, H/2 - target.y * 1.2).scale(1.2)
      );
      // Flash the node
      nodeGroups.filter(d => d.id === hash).select(".node-glow")
        .transition().duration(300).attr("opacity", 0.8)
        .transition().duration(300).attr("opacity", 0.15);
    } else if (attempts < maxAttempts) {
      setTimeout(tryOpen, 500);
    }
  }
  // Start trying after initial render
  setTimeout(tryOpen, 1000);
}
handleHashLink();
window.addEventListener("hashchange", () => { handleHashLink(); });
